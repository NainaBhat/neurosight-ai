services:
  - type: web
    name: neurosight-ai
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
       - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
       - key: CORS_ORIGINS
        value: https://neurosight-ai.vercel.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
```
