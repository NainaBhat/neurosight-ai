services:
  - type: web
    name: neurosight-ai
    runtime: node
    plan: free
    buildCommand: |
      python3.11 -m venv venv
      . venv/bin/activate
      pip install -r requirements.txt
      npm install
      python3.11 download_models.py
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
