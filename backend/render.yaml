services:
  - type: web
    name: neurosight-ai
    runtime: node
    plan: free
    env: node
    region: oregon
    buildCommand: >
      npm install &&
      pip install --upgrade pip &&
      pip install -r src/backend/requirements.txt
    startCommand: node src/backend/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://neurosight-ai.vercel.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FLASK_ENV
        value: "production"
      - key: VITE_API_URL
        value: https://neurosight-ai-gj77.onrender.com



