services:
  - type: web
    name: neurosight-ai
    runtime: node
    plan: free
    env: node
    region: oregon
    buildCommand: >
      npm install &&
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: node server.js
    envVars:
       - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
       - key: CORS_ORIGINS
        value: https://neurosight-ai.vercel.app
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FLASK_ENV
        value: "production




