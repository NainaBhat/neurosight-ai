services:
  - type: web
    name: neurosight-ai
    runtime: node
    plan: free
    buildCommand: |
     npm install
     pip install -r requirements.txt
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
       - key: FLASK_ENV
        value: production
      - key: PORT
        value: "3000"
```
